name: "ci"
on:
  workflow_dispatch: # allows manual triggering
  pull_request:
    branches: [main]
  push:
    branches: [main]
  merge_group:
jobs:
  dependencies:
    runs-on: ubuntu-latest
    environment: cachix
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: nixos/nix-installer-action@main
        with:
          extra-conf: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      - uses: cachix/cachix-action@v17
        with:
          name: kenji
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - uses: DeterminateSystems/magic-nix-cache-action@v13
        with:
          diagnostic-endpoint: ""
      - name: "build dependencies"
        run: nix build .#checks.x86_64-linux.cargoArtifacts -Lvv --no-update-lock-file
  formatting:
    runs-on: ubuntu-latest
    environment: cachix
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: nixos/nix-installer-action@main
        with:
          extra-conf: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      - uses: cachix/cachix-action@v17
        with:
          name: kenji
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - uses: DeterminateSystems/magic-nix-cache-action@v13
        with:
          diagnostic-endpoint: ""
      - name: "check formatting"
        run: nix build .#checks.x86_64-linux.treefmt -Lvv --no-update-lock-file
  tests:
    runs-on: ubuntu-latest
    environment: cachix
    needs: ['formatting', 'dependencies']
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: nixos/nix-installer-action@main
        with:
          extra-conf: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      - uses: cachix/cachix-action@v17
        with:
          name: kenji
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - uses: DeterminateSystems/magic-nix-cache-action@v13
        with:
          diagnostic-endpoint: ""
      - name: "run tests"
        run: nix build .#checks.x86_64-linux.cargoTest -Lvv --no-update-lock-file
  docs:
    runs-on: ubuntu-latest
    environment: cachix
    needs: ['formatting', 'dependencies']
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: nixos/nix-installer-action@main
        with:
          extra-conf: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      - uses: cachix/cachix-action@v17
        with:
          name: kenji
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - uses: DeterminateSystems/magic-nix-cache-action@v13
        with:
          diagnostic-endpoint: ""
      - name: "build cargo documentation"
        run: nix build .#checks.x86_64-linux.cargoDoc -Lvv --no-update-lock-file
  clippy:
    runs-on: ubuntu-latest
    environment: cachix
    needs: ['formatting', 'dependencies']
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: nixos/nix-installer-action@main
        with:
          extra-conf: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      - uses: cachix/cachix-action@v17
        with:
          name: kenji
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - uses: DeterminateSystems/magic-nix-cache-action@v13
        with:
          diagnostic-endpoint: ""
      - name: "run cargo clippy"
        run: nix build .#checks.x86_64-linux.cargoClippy -Lvv --no-update-lock-file
  flake-edit:
    runs-on: ubuntu-latest
    environment: cachix
    needs: ['formatting', 'dependencies' ]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: nixos/nix-installer-action@main
        with:
          extra-conf: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      - uses: cachix/cachix-action@v17
        with:
          name: kenji
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - uses: DeterminateSystems/magic-nix-cache-action@v13
        with:
          diagnostic-endpoint: ""
      - name: "build flake-edit"
        run: nix build .#default -Lvv --no-update-lock-file
  nixos-test:
    runs-on: ubuntu-latest
    environment: cachix
    needs: ['flake-edit']
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: nixos/nix-installer-action@main
        with:
          extra-conf: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      - uses: cachix/cachix-action@v17
        with:
          name: kenji
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - uses: DeterminateSystems/magic-nix-cache-action@v13
        with:
          diagnostic-endpoint: ""
      - name: "nixos-test"
        run: nix build .#checks.x86_64-linux.forgejo-test -Lvv --no-update-lock-file
  devshells:
    runs-on: ubuntu-latest
    environment: cachix
    needs: ['formatting']
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: nixos/nix-installer-action@main
        with:
          extra-conf: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      - uses: cachix/cachix-action@v17
        with:
          name: kenji
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - uses: DeterminateSystems/magic-nix-cache-action@v13
        with:
          diagnostic-endpoint: ""
      - name: "build devshells"
        run: nix develop .#full -Lvv --no-update-lock-file
  all:
    name: All checks passed
    if: always()
    runs-on: ubuntu-latest
    needs: ['formatting', 'dependencies', 'tests', 'docs', 'clippy', 'flake-edit', 'nixos-test', 'devshells']
    steps:
      - name: "verify all jobs passed"
        run: |
          if [[ "${{ needs.formatting.result }}" != "success" ]] || \
             [[ "${{ needs.dependencies.result }}" != "success" ]] || \
             [[ "${{ needs.tests.result }}" != "success" ]] || \
             [[ "${{ needs.docs.result }}" != "success" ]] || \
             [[ "${{ needs.clippy.result }}" != "success" ]] || \
             [[ "${{ needs.flake-edit.result }}" != "success" ]] || \
             [[ "${{ needs.nixos-test.result }}" != "success" ]] || \
             [[ "${{ needs.devshells.result }}" != "success" ]]; then
            echo "Some checks failed"
            exit 1
          fi
